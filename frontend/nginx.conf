server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 支持 SSE（Server-Sent Events）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 如果需要代理后端 API（可选）
    # location /api/ {
    #     proxy_pass http://backend:8000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}
